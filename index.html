<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Karma AI Ultra Editor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#050505;
--card:rgba(255,255,255,0.06);
--red:#ff1744;
--red2:#8b0000;
--white:#fff;
--gray:#999;
}

html,body{
width:100%;
height:100%;
background:
radial-gradient(circle at top,#42000e 0%,#080808 40%,#000 100%);
font-family:Arial,Helvetica,sans-serif;
overflow-x:hidden;
color:white;
touch-action:manipulation;
}

body{
padding:14px;
}

.app{
max-width:800px;
margin:auto;
position:relative;
z-index:1;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo-wrap{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:48px;
height:48px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff003c,#4a000b);
font-size:22px;
font-weight:bold;
box-shadow:0 0 30px rgba(255,0,70,.6);
}

.title{
font-size:24px;
font-weight:700;
}

.title span{
color:#ff4f6f;
}

.status{
padding:10px 14px;
border-radius:999px;
background:rgba(255,0,60,.15);
border:1px solid rgba(255,0,70,.25);
font-size:12px;
color:#ffb4c2;
}

.glass{
background:rgba(255,255,255,.05);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
box-shadow:
0 0 30px rgba(255,0,50,.08),
0 15px 50px rgba(0,0,0,.5);
}

.preview{
padding:15px;
overflow:hidden;
}

.canvas-box{
position:relative;
width:100%;
aspect-ratio:4/5;
border-radius:24px;
overflow:hidden;
background:#111;
}

canvas{
width:100%;
height:100%;
display:block;
background:#111;
}

.placeholder{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:12px;
font-size:15px;
color:#aaa;
pointer-events:none;
}

.placeholder div:first-child{
font-size:52px;
}

.actions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:14px;
}

.btn{
border:none;
outline:none;
padding:15px;
border-radius:18px;
font-weight:700;
font-size:14px;
background:#141414;
color:white;
cursor:pointer;
transition:.15s;
border:1px solid rgba(255,255,255,.08);
pointer-events:auto;
}

.btn:active{
transform:scale(.95);
}

.red{
background:linear-gradient(135deg,#ff0037,#6f0014);
box-shadow:0 0 25px rgba(255,0,70,.4);
}

.section{
margin-top:18px;
padding:16px;
}

.section-title{
font-size:17px;
margin-bottom:14px;
font-weight:700;
}

.filters{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.filter-btn{
padding:14px;
border-radius:18px;
border:none;
background:#151515;
color:white;
font-weight:700;
cursor:pointer;
transition:.15s;
border:1px solid rgba(255,255,255,.08);
}

.filter-btn:active{
transform:scale(.95);
background:#ff0037;
}

.controls{
display:flex;
flex-direction:column;
gap:15px;
}

.control{
display:flex;
flex-direction:column;
gap:8px;
}

.control-top{
display:flex;
justify-content:space-between;
}

input[type=range]{
appearance:none;
height:8px;
border-radius:999px;
background:#222;
outline:none;
}

input[type=range]::-webkit-slider-thumb{
appearance:none;
width:24px;
height:24px;
border-radius:50%;
background:#ff0037;
border:3px solid white;
box-shadow:0 0 18px rgba(255,0,70,.8);
}

.export{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.hidden{
display:none;
}

.compare{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
background:rgba(0,0,0,.4);
opacity:0;
pointer-events:none;
transition:.2s;
}

.compare.show{
opacity:1;
}

video{
width:100%;
border-radius:20px;
margin-top:14px;
display:none;
background:black;
}

.footer{
margin-top:20px;
padding-bottom:25px;
text-align:center;
font-size:12px;
color:#888;
}

.loader{
margin-top:12px;
height:6px;
background:#181818;
border-radius:999px;
overflow:hidden;
}

.loader div{
height:100%;
width:40%;
background:linear-gradient(90deg,#ff0037,#ff7b95);
animation:move 1s linear infinite;
}

@keyframes move{
0%{transform:translateX(-100%)}
100%{transform:translateX(300%)}
}

@media(max-width:500px){
.filters{
grid-template-columns:1fr 1fr;
}
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">

<div class="logo-wrap">
<div class="logo">K</div>
<div class="title">Karma <span>AI</span></div>
</div>

<div class="status" id="status">
Ready
</div>

</div>

<div class="glass preview">

<div class="canvas-box">

<canvas id="canvas"></canvas>

<div class="placeholder" id="placeholder">
<div>📸</div>
<div>Upload High Quality Photo</div>
</div>

<div class="compare" id="compareOverlay">
Original
</div>

</div>

<video id="video" autoplay playsinline></video>

<div class="actions">

<label for="upload" class="btn red">
Upload Photo
</label>

<button class="btn" id="cameraBtn">
Open Camera
</button>

<button class="btn" id="captureBtn">
Capture
</button>

<button class="btn" id="compareBtn">
Before / After
</button>

</div>

<input type="file" id="upload" class="hidden" accept="image/*">

<div class="loader">
<div></div>
</div>

</div>

<div class="glass section">

<div class="section-title">
AI Premium Filters
</div>

<div class="filters">

<button class="filter-btn" data-filter="iphone">iPhone HDR</button>
<button class="filter-btn" data-filter="vivo">Vivo VCS</button>

<button class="filter-btn" data-filter="sony">Sony Alpha</button>
<button class="filter-btn" data-filter="dslr">DSLR Pro</button>

<button class="filter-btn" data-filter="cinema">Cinema Max</button>
<button class="filter-btn" data-filter="portrait">Portrait+</button>

<button class="filter-btn" data-filter="night">Night AI</button>
<button class="filter-btn" data-filter="luxury">Luxury Red</button>

<button class="filter-btn" data-filter="ultra">Ultra Detail</button>
<button class="filter-btn" data-filter="moody">Moody Film</button>

</div>

</div>

<div class="glass section">

<div class="section-title">
Advanced AI Controls
</div>

<div class="controls">

<div class="control">
<div class="control-top">
<label>Brightness</label>
<span id="brightnessVal">100</span>
</div>
<input type="range" id="brightness" min="0" max="200" value="100">
</div>

<div class="control">
<div class="control-top">
<label>Contrast</label>
<span id="contrastVal">100</span>
</div>
<input type="range" id="contrast" min="0" max="300" value="100">
</div>

<div class="control">
<div class="control-top">
<label>Saturation</label>
<span id="saturationVal">100</span>
</div>
<input type="range" id="saturation" min="0" max="300" value="100">
</div>

<div class="control">
<div class="control-top">
<label>Sharpness</label>
<span id="sharpnessVal">0</span>
</div>
<input type="range" id="sharpness" min="0" max="100" value="0">
</div>

<div class="control">
<div class="control-top">
<label>Hue</label>
<span id="hueVal">0</span>
</div>
<input type="range" id="hue" min="0" max="360" value="0">
</div>

<div class="control">
<div class="control-top">
<label>Blur</label>
<span id="blurVal">0</span>
</div>
<input type="range" id="blur" min="0" max="10" value="0">
</div>

<div class="control">
<div class="control-top">
<label>Grain</label>
<span id="grainVal">0</span>
</div>
<input type="range" id="grain" min="0" max="100" value="0">
</div>

<div class="control">
<div class="control-top">
<label>Vignette</label>
<span id="vignetteVal">0</span>
</div>
<input type="range" id="vignette" min="0" max="100" value="0">
</div>

</div>

</div>

<div class="glass section">

<div class="section-title">
Export
</div>

<div class="export">

<button class="btn red" id="pngBtn">
Export PNG
</button>

<button class="btn red" id="jpgBtn">
Export JPG
</button>

<button class="btn" id="resetBtn">
Reset
</button>

<button class="btn" id="fitBtn">
Focus Canvas
</button>

</div>

</div>

<div class="footer">
Karma AI Ultra Cinematic Editor
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const upload=document.getElementById("upload");
const status=document.getElementById("status");
const placeholder=document.getElementById("placeholder");

const video=document.getElementById("video");
const cameraBtn=document.getElementById("cameraBtn");
const captureBtn=document.getElementById("captureBtn");

const compareBtn=document.getElementById("compareBtn");
const compareOverlay=document.getElementById("compareOverlay");

let img=null;
let stream=null;

const controls={
brightness:document.getElementById("brightness"),
contrast:document.getElementById("contrast"),
saturation:document.getElementById("saturation"),
sharpness:document.getElementById("sharpness"),
hue:document.getElementById("hue"),
blur:document.getElementById("blur"),
grain:document.getElementById("grain"),
vignette:document.getElementById("vignette")
};

function setStatus(text){
status.textContent=text;
}

function resizeCanvas(w,h){
canvas.width=w;
canvas.height=h;
}

function draw(){

if(!img) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter=`
brightness(${controls.brightness.value}%)
contrast(${controls.contrast.value}%)
saturate(${controls.saturation.value}%)
hue-rotate(${controls.hue.value}deg)
blur(${controls.blur.value}px)
`;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

applySharpness();
applyGrain();
applyVignette();

}

function applySharpness(){

const amount=Number(controls.sharpness.value);

if(amount<=0) return;

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const data=imageData.data;

for(let i=0;i<data.length;i+=4){

data[i]=Math.min(255,data[i]*(1+amount/250));
data[i+1]=Math.min(255,data[i+1]*(1+amount/250));
data[i+2]=Math.min(255,data[i+2]*(1+amount/250));

}

ctx.putImageData(imageData,0,0);

}

function applyGrain(){

const amount=Number(controls.grain.value);

if(amount<=0) return;

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);

const data=imageData.data;

for(let i=0;i<data.length;i+=4){

const noise=(Math.random()-0.5)*amount;

data[i]+=noise;
data[i+1]+=noise;
data[i+2]+=noise;

}

ctx.putImageData(imageData,0,0);

}

function applyVignette(){

const amount=Number(controls.vignette.value);

if(amount<=0) return;

const gradient=ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
canvas.width/5,
canvas.width/2,
canvas.height/2,
canvas.width/1.1
);

gradient.addColorStop(0,"rgba(0,0,0,0)");
gradient.addColorStop(1,`rgba(0,0,0,${amount/100})`);

ctx.fillStyle=gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

}

function loadImage(src){

const image=new Image();

image.onload=()=>{

img=image;

resizeCanvas(image.width,image.height);

draw();

placeholder.style.display="none";

setStatus("AI Photo Loaded");

};

image.src=src;

}

upload.addEventListener("change",e=>{

const file=e.target.files[0];

if(!file) return;

setStatus("Loading Photo...");

const reader=new FileReader();

reader.onload=ev=>{
loadImage(ev.target.result);
};

reader.readAsDataURL(file);

});

Object.keys(controls).forEach(key=>{

const input=controls[key];
const val=document.getElementById(key+"Val");

input.addEventListener("input",()=>{

val.textContent=input.value;

draw();

});

});

function applyPreset(values){

Object.keys(values).forEach(key=>{

controls[key].value=values[key];

document.getElementById(key+"Val").textContent=values[key];

});

draw();

}

document.querySelectorAll(".filter-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

const name=btn.dataset.filter;

const presets={

iphone:{
brightness:108,
contrast:135,
saturation:140,
sharpness:45,
hue:0,
blur:0,
grain:4,
vignette:10
},

vivo:{
brightness:112,
contrast:145,
saturation:185,
sharpness:55,
hue:4,
blur:0,
grain:6,
vignette:12
},

sony:{
brightness:102,
contrast:155,
saturation:120,
sharpness:70,
hue:0,
blur:0,
grain:10,
vignette:25
},

dslr:{
brightness:105,
contrast:170,
saturation:130,
sharpness:80,
hue:0,
blur:0,
grain:14,
vignette:35
},

cinema:{
brightness:92,
contrast:180,
saturation:125,
sharpness:40,
hue:350,
blur:0,
grain:20,
vignette:50
},

portrait:{
brightness:115,
contrast:120,
saturation:135,
sharpness:30,
hue:2,
blur:1,
grain:4,
vignette:8
},

night:{
brightness:85,
contrast:165,
saturation:115,
sharpness:60,
hue:210,
blur:0,
grain:18,
vignette:45
},

luxury:{
brightness:98,
contrast:175,
saturation:150,
sharpness:50,
hue:350,
blur:0,
grain:12,
vignette:40
},

ultra:{
brightness:110,
contrast:190,
saturation:180,
sharpness:90,
hue:0,
blur:0,
grain:3,
vignette:10
},

moody:{
brightness:90,
contrast:160,
saturation:80,
sharpness:45,
hue:320,
blur:0,
grain:25,
vignette:55
}

};

applyPreset(presets[name]);

setStatus(name.toUpperCase()+" Applied");

});

});

document.getElementById("resetBtn").addEventListener("click",()=>{

applyPreset({
brightness:100,
contrast:100,
saturation:100,
sharpness:0,
hue:0,
blur:0,
grain:0,
vignette:0
});

setStatus("Reset Complete");

});

compareBtn.addEventListener("touchstart",showOriginal);
compareBtn.addEventListener("mousedown",showOriginal);

compareBtn.addEventListener("touchend",hideOriginal);
compareBtn.addEventListener("mouseup",hideOriginal);
compareBtn.addEventListener("mouseleave",hideOriginal);

function showOriginal(){

if(!img) return;

compareOverlay.classList.add("show");

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter="none";

ctx.drawImage(img,0,0,canvas.width,canvas.height);

}

function hideOriginal(){

compareOverlay.classList.remove("show");

draw();

}

function download(type){

if(!img){
setStatus("No Image");
return;
}

const a=document.createElement("a");

a.download=`karma-ai.${type}`;

if(type==="png"){
a.href=canvas.toDataURL("image/png");
}else{
a.href=canvas.toDataURL("image/jpeg",0.95);
}

document.body.appendChild(a);

a.click();

a.remove();

setStatus(type.toUpperCase()+" Exported");

}

document.getElementById("pngBtn").addEventListener("click",()=>{
download("png");
});

document.getElementById("jpgBtn").addEventListener("click",()=>{
download("jpg");
});

document.getElementById("fitBtn").addEventListener("click",()=>{

canvas.scrollIntoView({
behavior:"smooth",
block:"center"
});

});

cameraBtn.addEventListener("click",async()=>{

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
},
audio:false
});

video.srcObject=stream;

video.style.display="block";

setStatus("Camera Opened");

}catch(e){

setStatus("Camera Permission Denied");

}

});

captureBtn.addEventListener("click",()=>{

if(!stream){
setStatus("Open Camera First");
return;
}

resizeCanvas(video.videoWidth,video.videoHeight);

ctx.drawImage(video,0,0,canvas.width,canvas.height);

const captured=new Image();

captured.onload=()=>{

img=captured;

draw();

};

captured.src=canvas.toDataURL("image/png");

placeholder.style.display="none";

setStatus("Photo Captured");

});

});

</script>

</body>
  </html>
